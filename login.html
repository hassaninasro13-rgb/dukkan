<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>دكّان | تسجيل الدخول</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0b1530;
      --bg-card: #111d3d;
      --border: rgba(240, 165, 0, 0.25);
      --gold: #f0a500;
      --gold-hover: #ffc233;
      --text: #f0f4ff;
      --muted: #9cb0d0;
      --error: #ff6b6b;
      --ok: #4ecdc4;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Cairo', sans-serif;
      background: linear-gradient(160deg, var(--bg) 0%, #060d1f 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }
    .shell {
      width: 100%;
      max-width: 420px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px 24px 32px;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.45);
    }
    .brand {
      font-family: 'Tajawal', sans-serif;
      font-size: 1.75rem;
      font-weight: 900;
      color: var(--gold);
      text-align: center;
      margin-bottom: 6px;
    }
    .subtitle {
      text-align: center;
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 22px;
    }
    .tabs {
      display: flex;
      gap: 8px;
      padding: 4px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--border);
      border-radius: 14px;
      margin-bottom: 20px;
    }
    .tab-btn {
      flex: 1;
      padding: 12px 10px;
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      background: transparent;
      color: var(--muted);
      transition: background 0.2s, color 0.2s;
    }
    .tab-btn.active { background: var(--gold); color: #0b1530; }
    .tab-btn:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }
    .alert {
      display: none;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 0.88rem;
      margin-bottom: 16px;
      line-height: 1.5;
    }
    .alert.show { display: block; }
    .alert.err {
      background: rgba(255, 107, 107, 0.12);
      border: 1px solid rgba(255, 107, 107, 0.35);
      color: var(--error);
    }
    .alert.ok {
      background: rgba(78, 205, 196, 0.12);
      border: 1px solid rgba(78, 205, 196, 0.35);
      color: var(--ok);
    }
    .panel { display: none; width: 100%; }
    .panel.active { display: block; }
    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      text-align: right;
      outline: none;
    }
    .field input:focus { border-color: var(--gold); }
    .field input::placeholder { color: rgba(156, 176, 208, 0.45); }
    .btn-gold {
      width: 100%;
      margin-top: 8px;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: var(--gold);
      color: #0b1530;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      box-shadow: 0 8px 28px rgba(240, 165, 0, 0.35);
    }
    .btn-gold:hover { background: var(--gold-hover); transform: translateY(-1px); }
    .btn-gold:disabled { opacity: 0.65; cursor: not-allowed; transform: none; }
    .back {
      display: inline-block;
      margin-top: 18px;
      font-size: 0.85rem;
      color: var(--muted);
      text-decoration: none;
    }
    .back:hover { color: var(--gold); }
    .hint { font-size: 0.78rem; color: var(--muted); margin-top: 12px; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="shell">
    <div class="brand">🛍️ دكّان</div>
    <p class="subtitle">تسجيل الدخول بحساب التاجر (جدول merchants)</p>

    <div class="tabs" role="tablist">
      <button type="button" class="tab-btn active" id="tab-login" onclick="switchTab('login')">تسجيل الدخول</button>
      <button type="button" class="tab-btn" id="tab-register" onclick="switchTab('register')">إنشاء حساب</button>
    </div>

    <div class="alert" id="alert" role="alert"></div>

    <div class="panel active" id="panel-login">
      <div class="field">
        <label for="login-email">البريد الإلكتروني</label>
        <input id="login-email" type="email" autocomplete="email" placeholder="example@mail.com" />
      </div>
      <div class="field">
        <label for="login-pass">كلمة المرور</label>
        <input id="login-pass" type="password" autocomplete="current-password" placeholder="••••••••" />
      </div>
      <button type="button" class="btn-gold" id="btn-login" onclick="doLogin()">دخول</button>
    </div>

    <div class="panel" id="panel-register">
      <div class="field">
        <label for="reg-store">اسم المتجر</label>
        <input id="reg-store" type="text" placeholder="مثال: متجر النور" />
      </div>
      <div class="field">
        <label for="reg-email">البريد الإلكتروني</label>
        <input id="reg-email" type="email" autocomplete="email" placeholder="example@mail.com" />
      </div>
      <div class="field">
        <label for="reg-phone">رقم الهاتف</label>
        <input id="reg-phone" type="tel" placeholder="07XXXXXXXXX" dir="ltr" style="text-align:right" />
      </div>
      <div class="field">
        <label for="reg-pass">كلمة المرور</label>
        <input id="reg-pass" type="password" autocomplete="new-password" placeholder="8 أحرف على الأقل" />
      </div>
      <button type="button" class="btn-gold" id="btn-register" onclick="doRegister()">إنشاء حساب</button>
      <p class="hint">للتسجيل الكامل مع بيانات إضافية يمكنك استخدام <a href="register.html" style="color:var(--gold)">صفحة التسجيل</a>.</p>
    </div>

    <a href="index.html" class="back">← العودة للرئيسية</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    var SUPABASE_URL = 'https://aukdrcusgnfjkaprgnuf.supabase.co';
    var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF1a2RyY3VzZ25mamthcHJnbnVmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNjQ3MzAsImV4cCI6MjA5Mjk0MDczMH0.6asZg-ZjC8BYdaOj3V18_MZvGplcvJqTs_gqFhG1cQM';

    if (!window.supabase || typeof window.supabase.createClient !== 'function') {
      document.getElementById('alert').className = 'alert err show';
      document.getElementById('alert').textContent = 'تعذّر تحميل مكتبة الاتصال.';
    }

    var sb = window.supabase ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

    function showAlert(msg, kind) {
      var el = document.getElementById('alert');
      el.textContent = msg;
      el.className = 'alert show ' + (kind === 'ok' ? 'ok' : 'err');
    }
    function hideAlert() {
      var el = document.getElementById('alert');
      el.className = 'alert';
      el.textContent = '';
    }

    function switchTab(name) {
      hideAlert();
      var loginP = document.getElementById('panel-login');
      var regP = document.getElementById('panel-register');
      var tL = document.getElementById('tab-login');
      var tR = document.getElementById('tab-register');
      if (name === 'register') {
        loginP.classList.remove('active');
        regP.classList.add('active');
        tL.classList.remove('active');
        tR.classList.add('active');
      } else {
        regP.classList.remove('active');
        loginP.classList.add('active');
        tR.classList.remove('active');
        tL.classList.add('active');
      }
    }

    /** مطابقة المشروع: password_hash = btoa(كلمة المرور) كما في merchant-dashboard */
    function hashPassword(plain) {
      return btoa(plain);
    }

    function saveMerchantSession(row) {
      if (!row || !row.id) return;
      localStorage.setItem('merchant_id', row.id);
      localStorage.setItem('dukkan_merchant', JSON.stringify(row));
    }

    function goDashboard() {
      window.location.href = 'dashboard.html';
    }

    async function doLogin() {
      hideAlert();
      if (!sb) {
        showAlert('الاتصال غير جاهز');
        return;
      }
      var email = document.getElementById('login-email').value.trim().toLowerCase();
      var pass = document.getElementById('login-pass').value;
      if (!email || !pass) {
        showAlert('يرجى إدخال البريد وكلمة المرور');
        return;
      }
      var btn = document.getElementById('btn-login');
      btn.disabled = true;
      btn.textContent = 'جاري الدخول…';
      try {
        var res = await sb
          .from('merchants')
          .select('*')
          .eq('email', email)
          .eq('password_hash', hashPassword(pass))
          .maybeSingle();
        if (res.error) throw res.error;
        var data = res.data;
        if (!data) {
          showAlert('البريد أو كلمة المرور غير صحيحة');
          return;
        }
        if (data.is_active === false) {
          showAlert('حسابك غير مفعّل حالياً');
          return;
        }
        saveMerchantSession(data);
        showAlert('تم الدخول، جاري التحويل…', 'ok');
        goDashboard();
      } catch (e) {
        showAlert((e && e.message) ? e.message : 'تعذّر تسجيل الدخول');
      } finally {
        btn.disabled = false;
        btn.textContent = 'دخول';
      }
    }

    function slugifyStoreName(name) {
      var s = (name || '').toLowerCase().trim().replace(/\s+/g, '-').replace(/[^\w\u0600-\u06FF-]/g, '').replace(/-+/g, '-');
      if (!s) s = 'store-' + Date.now();
      return s.slice(0, 48);
    }

    async function doRegister() {
      hideAlert();
      if (!sb) {
        showAlert('الاتصال غير جاهز');
        return;
      }
      var store = document.getElementById('reg-store').value.trim();
      var email = document.getElementById('reg-email').value.trim().toLowerCase();
      var phone = document.getElementById('reg-phone').value.trim();
      var pass = document.getElementById('reg-pass').value;
      if (!store || !email || !phone || !pass) {
        showAlert('يرجى تعبئة جميع الحقول');
        return;
      }
      if (pass.length < 8) {
        showAlert('كلمة المرور 8 أحرف على الأقل');
        return;
      }
      var btn = document.getElementById('btn-register');
      btn.disabled = true;
      btn.textContent = 'جاري الإنشاء…';
      try {
        var store_slug = slugifyStoreName(store);
        var dup = await sb
          .from('merchants')
          .select('id,email,store_slug')
          .or('email.eq.' + email + ',store_slug.eq.' + store_slug)
          .limit(2);
        if (dup.error) throw dup.error;
        var rows = dup.data || [];
        if (rows.some(function (r) { return r.email === email; })) {
          showAlert('هذا البريد مسجّل مسبقاً');
          return;
        }
        if (rows.some(function (r) { return r.store_slug === store_slug; })) {
          store_slug = store_slug + '-' + String(Date.now()).slice(-4);
        }
        var payload = {
          full_name: store,
          email: email,
          phone: phone,
          password_hash: hashPassword(pass),
          store_name: store,
          store_slug: store_slug,
          slug: store_slug,
          store_description: '',
          governorate: 'بغداد',
          whatsapp: phone,
          plan: 'free',
          is_active: true
        };
        var ins = await sb.from('merchants').insert([payload]).select('*').single();
        if (ins.error) throw ins.error;
        var merchant = ins.data;
        var settingsPayload = {
          merchant_id: merchant.id,
          shipping_baghdad: 5000,
          shipping_other: 6000,
          topbar_text: 'شحن مجاني - الدفع عند الاستلام',
          whatsapp: phone
        };
        var st = await sb.from('store_settings').insert([settingsPayload]).select('*').single();
        if (st.error) {
          console.warn('store_settings insert', st.error);
        }
        saveMerchantSession(merchant);
        showAlert('تم إنشاء الحساب، جاري التحويل…', 'ok');
        goDashboard();
      } catch (e) {
        showAlert((e && e.message) ? e.message : 'تعذّر إنشاء الحساب');
      } finally {
        btn.disabled = false;
        btn.textContent = 'إنشاء حساب';
      }
    }

    if (new URLSearchParams(location.search).get('tab') === 'register') {
      switchTab('register');
    }
  </script>
</body>
</html>
