<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>دكّان | تسجيل الدخول</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0b1530;
      --bg-card: #111d3d;
      --border: rgba(240, 165, 0, 0.25);
      --gold: #f0a500;
      --gold-hover: #ffc233;
      --text: #f0f4ff;
      --muted: #9cb0d0;
      --error: #ff6b6b;
      --ok: #4ecdc4;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Cairo', sans-serif;
      background: linear-gradient(160deg, var(--bg) 0%, #060d1f 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }
    .shell {
      width: 100%;
      max-width: 420px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px 24px 32px;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.45);
    }
    .brand {
      font-family: 'Tajawal', sans-serif;
      font-size: 1.75rem;
      font-weight: 900;
      color: var(--gold);
      text-align: center;
      margin-bottom: 6px;
    }
    .subtitle {
      text-align: center;
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 22px;
    }
    .tabs {
      display: flex;
      gap: 8px;
      padding: 4px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--border);
      border-radius: 14px;
      margin-bottom: 20px;
    }
    .tab-btn {
      flex: 1;
      padding: 12px 10px;
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      background: transparent;
      color: var(--muted);
      transition: background 0.2s, color 0.2s;
    }
    .tab-btn.active {
      background: var(--gold);
      color: #0b1530;
    }
    .tab-btn:focus-visible {
      outline: 2px solid var(--gold);
      outline-offset: 2px;
    }
    .alert {
      display: none;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 0.88rem;
      margin-bottom: 16px;
      line-height: 1.5;
    }
    .alert.show { display: block; }
    .alert.err {
      background: rgba(255, 107, 107, 0.12);
      border: 1px solid rgba(255, 107, 107, 0.35);
      color: var(--error);
    }
    .alert.ok {
      background: rgba(78, 205, 196, 0.12);
      border: 1px solid rgba(78, 205, 196, 0.35);
      color: var(--ok);
    }
    .panel { display: none; width: 100%; }
    .panel.active { display: block; }
    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      text-align: right;
      outline: none;
    }
    .field input:focus {
      border-color: var(--gold);
    }
    .field input::placeholder { color: rgba(156, 176, 208, 0.45); }
    .btn-gold {
      width: 100%;
      margin-top: 8px;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: var(--gold);
      color: #0b1530;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      box-shadow: 0 8px 28px rgba(240, 165, 0, 0.35);
    }
    .btn-gold:hover { background: var(--gold-hover); transform: translateY(-1px); }
    .btn-gold:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
    }
    .back {
      display: inline-block;
      margin-top: 18px;
      font-size: 0.85rem;
      color: var(--muted);
      text-decoration: none;
    }
    .back:hover { color: var(--gold); }
    .loader {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(11, 21, 48, 0.3);
      border-top-color: #0b1530;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="shell">
    <div class="brand">🛍️ دكّان</div>
    <p class="subtitle">منصة التجار — تسجيل الدخول أو إنشاء حساب</p>

    <div class="tabs" role="tablist" aria-label="نوع النموذج">
      <button type="button" role="tab" class="tab-btn active" id="tab-login" aria-selected="true" onclick="switchTab('login')">
        تسجيل الدخول
      </button>
      <button type="button" role="tab" class="tab-btn" id="tab-register" aria-selected="false" onclick="switchTab('register')">
        إنشاء حساب
      </button>
    </div>

    <div class="alert" id="alert" role="alert"></div>

    <div class="panel active" id="panel-login" role="tabpanel">
      <div class="field">
        <label for="login-email">البريد الإلكتروني</label>
        <input id="login-email" type="email" autocomplete="email" placeholder="you@example.com" />
      </div>
      <div class="field">
        <label for="login-pass">كلمة المرور</label>
        <input id="login-pass" type="password" autocomplete="current-password" placeholder="••••••••" />
      </div>
      <button type="button" class="btn-gold" id="btn-login" onclick="doLogin()">دخول</button>
    </div>

    <div class="panel" id="panel-register" role="tabpanel">
      <div class="field">
        <label for="reg-store">اسم المتجر</label>
        <input id="reg-store" type="text" autocomplete="organization" placeholder="مثال: متجر النور" />
      </div>
      <div class="field">
        <label for="reg-email">البريد الإلكتروني</label>
        <input id="reg-email" type="email" autocomplete="email" placeholder="you@example.com" />
      </div>
      <div class="field">
        <label for="reg-phone">رقم الهاتف</label>
        <input id="reg-phone" type="tel" autocomplete="tel" placeholder="07XXXXXXXXX" dir="ltr" style="text-align:right" />
      </div>
      <div class="field">
        <label for="reg-pass">كلمة المرور</label>
        <input id="reg-pass" type="password" autocomplete="new-password" placeholder="8 أحرف على الأقل" />
      </div>
      <button type="button" class="btn-gold" id="btn-register" onclick="doRegister()">تسجيل</button>
    </div>

    <a href="index.html" class="back">← العودة للرئيسية</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    (function () {
      var SUPABASE_URL = 'https://aukdrcusgnfjkaprgnuf.supabase.co';
      var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF1a2RyY3VzZ25mamthcHJnbnVmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNjQ3MzAsImV4cCI6MjA5Mjk0MDczMH0.6asZg-ZjC8BYdaOj3V18_MZvGplcvJqTs_gqFhG1cQM';

      if (!window.supabase || typeof window.supabase.createClient !== 'function') {
        document.getElementById('alert').className = 'alert err show';
        document.getElementById('alert').textContent = 'تعذّر تحميل مكتبة الاتصال. حدّث الصفحة أو تحقق من الشبكة.';
        return;
      }

      var createClient = window.supabase.createClient;
      var supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      function showAlert(msg, kind) {
        var el = document.getElementById('alert');
        el.textContent = msg;
        el.className = 'alert show ' + (kind === 'ok' ? 'ok' : 'err');
      }
      function hideAlert() {
        var el = document.getElementById('alert');
        el.className = 'alert';
        el.textContent = '';
      }

      window.switchTab = function (name) {
        var loginPanel = document.getElementById('panel-login');
        var regPanel = document.getElementById('panel-register');
        var tabL = document.getElementById('tab-login');
        var tabR = document.getElementById('tab-register');

        hideAlert();
        if (name === 'register') {
          loginPanel.classList.remove('active');
          regPanel.classList.add('active');
          tabL.classList.remove('active');
          tabR.classList.add('active');
          tabL.setAttribute('aria-selected', 'false');
          tabR.setAttribute('aria-selected', 'true');
        } else {
          regPanel.classList.remove('active');
          loginPanel.classList.add('active');
          tabR.classList.remove('active');
          tabL.classList.add('active');
          tabR.setAttribute('aria-selected', 'false');
          tabL.setAttribute('aria-selected', 'true');
        }
      };

      function setBtnLoading(id, loading, labelIdle) {
        var b = document.getElementById(id);
        if (!b) return;
        b.disabled = loading;
        b.textContent = loading ? '… جاري المعالجة' : labelIdle;
      }

      window.doLogin = async function () {
        hideAlert();
        var email = document.getElementById('login-email').value.trim();
        var pass = document.getElementById('login-pass').value;
        if (!email || !pass) {
          showAlert('يرجى إدخال البريد وكلمة المرور');
          return;
        }
        setBtnLoading('btn-login', true, 'دخول');
        var out = await supabase.auth.signInWithPassword({ email: email, password: pass });
        setBtnLoading('btn-login', false, 'دخول');
        if (out.error) {
          showAlert(out.error.message || 'فشل تسجيل الدخول');
          return;
        }
        showAlert('تم الدخول بنجاح، جاري التحويل…', 'ok');
        window.location.href = 'dashboard.html';
      };

      window.doRegister = async function () {
        hideAlert();
        var store = document.getElementById('reg-store').value.trim();
        var email = document.getElementById('reg-email').value.trim();
        var phone = document.getElementById('reg-phone').value.trim();
        var pass = document.getElementById('reg-pass').value;
        if (!store || !email || !phone || !pass) {
          showAlert('يرجى تعبئة جميع الحقول');
          return;
        }
        if (pass.length < 8) {
          showAlert('كلمة المرور يجب أن تكون 8 أحرف على الأقل');
          return;
        }
        setBtnLoading('btn-register', true, 'تسجيل');
        var sign = await supabase.auth.signUp({
          email: email,
          password: pass,
          options: { data: { store_name: store, phone: phone } }
        });
        if (sign.error) {
          setBtnLoading('btn-register', false, 'تسجيل');
          showAlert(sign.error.message || 'فشل إنشاء الحساب');
          return;
        }
        if (sign.data && sign.data.user) {
          await supabase.from('merchants').insert({
            id: sign.data.user.id,
            store_name: store,
            email: email,
            phone: phone,
            created_at: new Date().toISOString()
          });
        }
        setBtnLoading('btn-register', false, 'تسجيل');
        showAlert('تم إنشاء الحساب، جاري التحويل…', 'ok');
        window.location.href = 'dashboard.html';
      };

      if (new URLSearchParams(location.search).get('tab') === 'register') {
        window.switchTab('register');
      }

      supabase.auth.getSession().then(function (res) {
        if (res.data && res.data.session) {
          window.location.href = 'dashboard.html';
        }
      });
    })();
  </script>
</body>
</html>
