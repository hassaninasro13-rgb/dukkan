<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>دكّان — تسجيل الدخول</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0e1117;
      --card: #161b22;
      --border: #30363d;
      --gold: #f0a500;
      --text: #e6edf3;
      --muted: #7d8590;
      --red: #f85149;
    }
    body {
      font-family: 'Cairo', sans-serif;
      background: radial-gradient(circle at top left, rgba(240, 165, 0, 0.08), transparent 40%), var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }
    .box {
      width: 100%;
      max-width: 400px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px 24px 32px;
    }
    .logo {
      font-family: 'Tajawal', sans-serif;
      font-size: 1.75rem;
      font-weight: 900;
      color: var(--gold);
      text-align: center;
      margin-bottom: 8px;
    }
    .sub {
      text-align: center;
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 24px;
    }
    .field {
      margin-bottom: 16px;
    }
    .field label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      text-align: right;
      outline: none;
    }
    .field input:focus {
      border-color: var(--gold);
    }
    .btn {
      width: 100%;
      margin-top: 8px;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: var(--gold);
      color: #000;
      font-family: 'Tajawal', sans-serif;
      font-size: 1rem;
      font-weight: 900;
      cursor: pointer;
    }
    .btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }
    .err {
      display: none;
      padding: 12px;
      border-radius: 12px;
      background: rgba(248, 81, 73, 0.12);
      border: 1px solid rgba(248, 81, 73, 0.35);
      color: var(--red);
      font-size: 0.88rem;
      margin-bottom: 16px;
      line-height: 1.5;
    }
    .err.show { display: block; }
    .links {
      margin-top: 20px;
      text-align: center;
      font-size: 0.88rem;
      color: var(--muted);
    }
    .links a {
      color: var(--gold);
      text-decoration: none;
      font-weight: 700;
    }
    .links a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(function (regs) {
    regs.forEach(function (reg) { reg.unregister(); });
  });
}
</script>
  <div class="box">
    <div class="logo">🏪 دكّان</div>
    <p class="sub">تسجيل دخول التاجر — نفس حساب التسجيل في الصفحة الرسمية</p>

    <div class="err" id="err"></div>

    <div class="field">
      <label for="email">البريد الإلكتروني</label>
      <input id="email" type="email" autocomplete="email" placeholder="merchant@email.com" dir="ltr" style="text-align:right" />
    </div>
    <div class="field">
      <label for="password">كلمة المرور</label>
      <input id="password" type="password" autocomplete="current-password" placeholder="••••••••" />
    </div>

    <button type="button" class="btn" id="btn" onclick="doLogin()">دخول</button>

    <div class="links">
      ليس لديك حساب؟ <a href="register.html">سجّل متجرك</a><br />
      <a href="index.html">← العودة للرئيسية</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SURL = 'https://aukdrcusgnfjkaprgnuf.supabase.co';
    const SKEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF1a2RyY3VzZ25mamthcHJnbnVmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNjQ3MzAsImV4cCI6MjA5Mjk0MDczMH0.6asZg-ZjC8BYdaOj3V18_MZvGplcvJqTs_gqFhG1cQM';
    const SB = supabase.createClient(SURL, SKEY);

    function showErr(msg) {
      var el = document.getElementById('err');
      el.textContent = msg;
      el.classList.add('show');
    }
    function hideErr() {
      var el = document.getElementById('err');
      el.classList.remove('show');
      el.textContent = '';
    }

    async function doLogin() {
      hideErr();
      var email = document.getElementById('email').value.trim().toLowerCase();
      var pass = document.getElementById('password').value;
      var btn = document.getElementById('btn');

      if (!email || !pass) {
        showErr('يرجى إدخال البريد وكلمة المرور');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'جاري الدخول…';

      try {
        var res = await SB.from('merchants')
          .select('*')
          .eq('email', email)
          .maybeSingle();

        if (res.error) throw res.error;

        var merchant = res.data;
        if (!merchant) {
          showErr('البريد الإلكتروني أو كلمة المرور غير صحيحة');
          return;
        }

        if (merchant.password_hash !== btoa(pass)) {
          showErr('البريد الإلكتروني أو كلمة المرور غير صحيحة');
          return;
        }

        if (merchant.is_active === false) {
          showErr('حسابك غير مفعّل حالياً');
          return;
        }

        localStorage.setItem('dukkan_merchant', JSON.stringify(merchant));
        window.location.href = 'merchant-dashboard.html';
      } catch (e) {
        showErr((e && e.message) ? e.message : 'تعذّر تسجيل الدخول');
      } finally {
        btn.disabled = false;
        btn.textContent = 'دخول';
      }
    }

    document.getElementById('password').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') doLogin();
    });
  </script>
</body>
</html>
