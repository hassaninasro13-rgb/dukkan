<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تم الطلب - دكّان</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Cairo', sans-serif;
      background: #0f0f1a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    .success-icon {
      width: 100px;
      height: 100px;
      background: rgba(34,197,94,0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 50px;
      animation: pulse 1s ease-in-out;
    }
    @keyframes pulse {
      0% { transform: scale(0); opacity: 0; }
      70% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }
    h1 {
      font-size: 28px;
      font-weight: 900;
      color: #22c55e;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #94a3b8;
      font-size: 14px;
      margin-bottom: 28px;
    }
    .order-number {
      background: rgba(245,166,35,0.1);
      border: 2px solid #f5a623;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
    }
    .order-label {
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 4px;
    }
    .order-code {
      font-size: 24px;
      font-weight: 900;
      color: #f5a623;
      letter-spacing: 2px;
    }
    .details-card {
      background: #1e1e2e;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 24px;
      text-align: right;
    }
    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #2a2a3e;
      font-size: 14px;
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-label { color: #94a3b8; }
    .detail-value { font-weight: 700; color: #fff; }
    .total-value { color: #f5a623; font-size: 18px; }
    .btn-whatsapp {
      display: block;
      width: 100%;
      background: #25d366;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 16px;
      font-size: 16px;
      font-family: 'Cairo', sans-serif;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 12px;
      text-decoration: none;
    }
    .btn-back {
      display: block;
      width: 100%;
      background: transparent;
      color: #f5a623;
      border: 2px solid #f5a623;
      border-radius: 12px;
      padding: 14px;
      font-size: 15px;
      font-family: 'Cairo', sans-serif;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="success-icon">✅</div>
    <h1 id="thankTitle">تم استلام طلبك! 🎉</h1>
    <p class="subtitle" id="thankMessage">سيتواصل معك فريقنا خلال 24 ساعة</p>
    <div class="order-number">
      <div class="order-label">رقم طلبك</div>
      <div class="order-code" id="orderNum">-</div>
    </div>
    <div class="details-card">
      <div class="detail-row">
        <span class="detail-value" id="productName">-</span>
        <span class="detail-label">المنتج</span>
      </div>
      <div class="detail-row">
        <span class="detail-value" id="qtyVal">1</span>
        <span class="detail-label">الكمية</span>
      </div>
      <div class="detail-row">
        <span class="detail-value total-value" id="totalVal">-</span>
        <span class="detail-label">الإجمالي</span>
      </div>
    </div>
    <a id="btnWhatsapp" class="btn-whatsapp" style="display:none">💬 تواصل معنا على واتساب</a>
    <a id="btnBack" class="btn-back" href="#">🏪 العودة للمتجر</a>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    const SUPABASE_URL = 'https://aukdrcusgnfjkaprgnuf.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF1a2RyY3VzZ25mamthcHJnbnVmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNjQ3MzAsImV4cCI6MjA5Mjk0MDczMH0.6asZg-ZjC8BYdaOj3V18_MZvGplcvJqTs_gqFhG1cQM';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
    const params = new URLSearchParams(window.location.search);
    document.getElementById('orderNum').textContent = params.get('order') || '-';
    document.getElementById('productName').textContent = params.get('name') || '-';
    document.getElementById('qtyVal').textContent = params.get('qty') || '1';
    document.getElementById('totalVal').textContent = Number(params.get('total')||0).toLocaleString('ar-IQ') + ' IQD';
    const store = params.get('store');
    if (store) {
      document.getElementById('btnBack').href = `/store?store=${encodeURIComponent(store)}`;
      loadStoreSettings(store);
    }

    async function loadStoreSettings(storeSlug) {
      try {
        const {data: merchant, error: merchantError} = await sb
          .from('merchants')
          .select('id')
          .eq('store_slug', storeSlug)
          .maybeSingle();
        if (merchantError) throw merchantError;
        if (!merchant?.id) return;

        const {data, error} = await sb
          .from('store_settings')
          .select('thankyou_title,thankyou_message,thankyou_whatsapp_enabled,whatsapp')
          .eq('merchant_id', merchant.id)
          .maybeSingle();
        if (error) throw error;
        if (!data) return;
        if (data.thankyou_title) document.getElementById('thankTitle').textContent = data.thankyou_title;
        if (data.thankyou_message) document.getElementById('thankMessage').textContent = data.thankyou_message;
        if (data.thankyou_whatsapp_enabled && data.whatsapp) {
          const btn = document.getElementById('btnWhatsapp');
          const phone = data.whatsapp.replace(/\D/g,'');
          btn.style.display = 'block';
          btn.href = `https://wa.me/${phone}?text=${encodeURIComponent('مرحباً، أريد الاستفسار عن طلبي رقم: ' + params.get('order'))}`;
        }
      } catch (error) {
        console.warn('[Dukkan] failed to load thank-you settings', error);
      }
    }
  </script>
</body>
</html>
